# /etc/nginx/sites-available/status-tv.conf
# Symlink: ln -s /etc/nginx/sites-available/status-tv.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # Self-signed certificate (generated by setup.sh)
    ssl_certificate     /etc/ssl/status-tv/cert.pem;
    ssl_certificate_key /etc/ssl/status-tv/key.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Frontend (static files)
    location / {
        proxy_pass http://127.0.0.1:3000;
    }

    # Backend API + WebSocket
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
    }

    location /webhook/ {
        proxy_pass http://127.0.0.1:3000;
    }

    location /ws {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 86400;
    }

    # MotionEye UI (proxy, optional)
    location /motioneye/ {
        proxy_pass http://127.0.0.1:8765/;
        proxy_set_header Host $host;
    }
}
